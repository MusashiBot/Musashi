name: Agent API Tests
run-name: >-
  Agent API Tests (${{ github.event_name == 'deployment_status' && 'preview deployment' || github.event_name == 'push' && 'push' || github.event_name == 'pull_request' && 'pull request' || github.event_name == 'schedule' && 'weekly perf' || github.event_name == 'workflow_dispatch' && format('manual {0}', inputs.suite) || github.event_name }})

on:
  push:
    branches:
      - testing
  pull_request:
  deployment_status:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: api
        type: choice
        options:
          - api
          - perf
          - stress
          - full
      api_base_url:
        description: Optional override for MUSASHI_API_BASE_URL
        required: false
        type: string
      timeout_ms:
        description: Optional override for MUSASHI_TEST_TIMEOUT_MS
        required: false
        type: string

concurrency:
  group: agent-api-tests-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  agent-api-tests:
    if: >
      github.event_name != 'deployment_status' ||
      (
        github.event.deployment_status.state == 'success' &&
        (
          contains(github.event.deployment.environment, 'Preview') ||
          contains(github.event.deployment.environment, 'preview')
        ) &&
        (
          github.event.deployment_status.environment_url ||
          github.event.deployment_status.target_url ||
          github.event.deployment.payload.web_url
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      API_USAGE_ADMIN_KEY: ${{ secrets.API_USAGE_ADMIN_KEY }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      MUSASHI_TEST_TIMEOUT_MS: ${{ inputs.timeout_ms || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select test suite
        id: suite
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "deployment_status" ]]; then
            echo "command=pnpm run agent:test:api" >> "$GITHUB_OUTPUT"
            echo "label=vercel preview api suite" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "command=pnpm run agent:test:api:perf" >> "$GITHUB_OUTPUT"
            echo "label=weekly perf suite" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.suite }}" in
              api)
                echo "command=pnpm run agent:test:api" >> "$GITHUB_OUTPUT"
                echo "label=manual api suite" >> "$GITHUB_OUTPUT"
                ;;
              perf)
                echo "command=pnpm run agent:test:api:perf" >> "$GITHUB_OUTPUT"
                echo "label=manual perf suite" >> "$GITHUB_OUTPUT"
                ;;
              stress)
                echo "command=pnpm run agent:test:api:stress" >> "$GITHUB_OUTPUT"
                echo "label=manual stress suite" >> "$GITHUB_OUTPUT"
                ;;
              full)
                echo "command=pnpm run agent:test:api:full" >> "$GITHUB_OUTPUT"
                echo "label=manual full suite" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unsupported suite: ${{ inputs.suite }}" >&2
                exit 1
                ;;
            esac
          else
            echo "command=pnpm run agent:test:api" >> "$GITHUB_OUTPUT"
            echo "label=push/pr api suite" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve API base URL
        id: api_base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "deployment_status" ]]; then
            preview_url="${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url || github.event.deployment.payload.web_url || '' }}"

            if [[ -z "$preview_url" ]]; then
              echo "Preview deployment did not provide a usable URL" >&2
              exit 1
            fi

            echo "url=${preview_url}" >> "$GITHUB_OUTPUT"
            echo "source=vercel preview deployment" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.api_base_url || '' }}" ]]; then
            echo "url=${{ inputs.api_base_url }}" >> "$GITHUB_OUTPUT"
            echo "source=workflow_dispatch input" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "source=default script base URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for preview API readiness
        if: github.event_name == 'deployment_status'
        shell: bash
        env:
          BASE_URL: ${{ steps.api_base.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          attempt=0
          max_attempts=30
          cookie_jar="/tmp/musashi-preview-cookie.txt"

          while [[ "$attempt" -lt "$max_attempts" ]]; do
            attempt=$((attempt + 1))

            status=$(curl -sS -o /tmp/musashi-preview-health.out -w "%{http_code}" \
              -L \
              --max-redirs 5 \
              -c "$cookie_jar" \
              -b "$cookie_jar" \
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
              -H "x-vercel-set-bypass-cookie: true" \
              "${BASE_URL}/api/health" || true)

            if [[ "$status" == "200" || "$status" == "503" ]]; then
              echo "Preview API ready on attempt ${attempt} with status ${status}"
              exit 0
            fi

            echo "Preview API not ready on attempt ${attempt}/${max_attempts} (status: ${status:-curl_failed})"
            sleep 10
          done

          echo "Preview API did not become ready in time"
          [[ -f /tmp/musashi-preview-health.out ]] && cat /tmp/musashi-preview-health.out
          exit 1

      - name: Run selected suite
        env:
          MUSASHI_API_BASE_URL: ${{ steps.api_base.outputs.url }}
        run: ${{ steps.suite.outputs.command }}

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Agent API Tests"
            echo ""
            echo "- Suite: ${{ steps.suite.outputs.label }}"
            echo "- Command: \`${{ steps.suite.outputs.command }}\`"
            echo "- API base URL source: ${{ steps.api_base.outputs.source }}"
            echo "- API base override: \`${{ steps.api_base.outputs.url || 'default' }}\`"
            echo "- Timeout override: \`${MUSASHI_TEST_TIMEOUT_MS:-default}\`"
            if [[ -n "${API_USAGE_ADMIN_KEY}" ]]; then
              echo "- Usage audit secret: configured"
            else
              echo "- Usage audit secret: not configured"
            fi
            if [[ -n "${VERCEL_AUTOMATION_BYPASS_SECRET}" ]]; then
              echo "- Vercel preview bypass: configured"
            else
              echo "- Vercel preview bypass: not configured"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
